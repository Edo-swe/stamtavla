||'[]')}catch{pigeons=[]}} function save(){localStorage.setItem('pigeons',JSON.stringify(pigeons))} function getPigeon(id){return id?pigeons.find(p=>p.id===id)||null:null} function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2)} // ══ INBREEDING ═══════════════════════════ function calcInbreeding(pigeonId){ const map={};pigeons.forEach(p=>map[p.id]=p); const subject=map[pigeonId]; if(!subject||(!subject.sireId&&!subject.damId))return 0; function getAncestorPaths(startId,maxD=10){ const paths=new Map(); function traverse(id,d){ if(!id||d>maxD)return;const p=map[id];if(!p)return; if(!paths.has(id))paths.set(id,[]); paths.get(id).push(d); traverse(p.sireId,d+1);traverse(p.damId,d+1); } traverse(startId,1);return paths; } const SP=subject.sireId?getAncestorPaths(subject.sireId):new Map(); const DP=subject.damId?getAncestorPaths(subject.damId):new Map(); let F=0; for(const[aId,sL]of SP){ if(!DP.has(aId))continue; const dL=DP.get(aId); const FA=map[aId]?calcInbreeding(aId):0; for(const n1 of sL)for(const n2 of dL)F+=Math.pow(0.5,n1+n2+1)*(1+FA); } return Math.min(F,1); } const _Fcache={}; function getF(id){if(_Fcache[id]===undefined)_Fcache[id]=calcInbreeding(id);return _Fcache[id]} function clearFcache(){Object.keys(_Fcache).forEach(k=>delete _Fcache[k])} function fColor(f){return f<0.03?'#7ec850':f<0.10?'#e8a020':'#e85050'} function fLabel(f){return f<0.03?'Låg inavel':f<0.10?'Måttlig inavel':f<0.20?'Hög inavel':'Mycket hög inavel'} function fClass(f){return f<0.03?'low':f<0.10?'mid':'high'} // ══ NAV ══════════════════════════════════ let activeTab='list'; function switchTab(tab){ if(tab==='list'||tab==='stats')activeTab=tab; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-'+(tab==='stats'?'stats':'list')).classList.add('active'); document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+tab).classList.add('active'); document.getElementById('view').scrollTop=0; if(tab==='stats')renderStats(); if(tab==='list')renderList(); } function showList(){switchTab('list')} function showDetail(id){currentDetailId=id;detailTab='pedigree';renderDetail(id);switchTab('detail')} // ══ LIST ══════════════════════════════════ function renderList(){ const q=(document.getElementById('search')?.value||'').toLowerCase(); const filtered=pigeons.filter(p=>p.name.toLowerCase().includes(q)||p.ring.toLowerCase().includes(q)); document.getElementById('list-count').textContent=pigeons.length+' duvor registrerade'; const el=document.getElementById('pigeon-list'); if(!filtered.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">🕊️</div><div class="empty-title">${pigeons.length===0?'Inga duvor ännu':'Inga träffar'}</div><div class="empty-sub">${pigeons.length===0?'Tryck på "+ Ny" för att lägga till din första duva.':'Prova ett annat sökord.'}</div>${pigeons.length===0?'<button class="btn-gold" onclick="showForm(null)">Lägg till duva</button>':''}</div>`; return; } el.innerHTML=filtered.map(p=>{ const f=getF(p.id),pct=(f*100).toFixed(1); return`<div class="pigeon-card" onclick="showDetail('${p.id}')"> <div class="p-avatar" style="background:${getColor(p.color)}22">🕊️</div> <div style="flex:1;min-width:0"> <div class="p-name">${esc(p.name)}</div> <div class="p-ring">${esc(p.ring)}</div> <div class="p-sub">${esc(p.sex)} · ${p.birthYear}${p.color?' · '+esc(p.color):''}</div> ${f>0?`<div style="font-size:11px;margin-top:3px;color:${fColor(f)}">⚠ Inavel: ${pct}%</div>`:''} </div> ${p.wins>0?`<div class="p-wins">🏆 ${p.wins}</div>`:''} <div class="chevron">›</div> </div>`; }).join(''); } // ══ DETAIL ════════════════════════════════ function renderDetail(id){ const p=getPigeon(id);if(!p)return; const c=getColor(p.color),sire=getPigeon(p.sireId),dam=getPigeon(p.damId); const f=getF(id),pct=(f*100).toFixed(1); document.getElementById('btn-edit').onclick=()=>showForm(p); document.getElementById('btn-delete').onclick=()=>confirmDelete(p); document.getElementById('detail-content').innerHTML=` <div class="detail-hero"> <div class="detail-avatar" style="background:${c}22;border-color:${c}55">🕊️</div> <div class="detail-name">${esc(p.name)}</div> <div class="detail-ring">${esc(p.ring)}</div> <div class="badge-row"> <span class="badge">${esc(p.sex)}</span> <span class="badge">${p.birthYear}</span> ${p.color?`<span class="badge"><span class="dot" style="background:${c};margin-right:4px"></span>${esc(p.color)}</span>`:''} ${p.wins>0?`<span class="badge gold">🏆 ${p.wins} segrar</span>`:''} <span class="badge inbred-${fClass(f)}">⚠ Inavel: ${pct}%</span> </div> <div class="inavel-bar-wrap"> <div class="inavel-label">INAVELSKOEFFICIENT (F) — WRIGHTS METOD</div> <div class="inavel-bar-track"><div class="inavel-bar-fill" style="width:${Math.min(f*200,100)}%;background:${fColor(f)}"></div></div> <div style="display:flex;justify-content:space-between;align-items:center"> <span class="inavel-pct" style="color:${fColor(f)}">${pct}%</span> <span class="inavel-desc">${fLabel(f)}</span> </div> </div> </div> <div class="page-tabs"> <div class="page-tab ${detailTab==='pedigree'?'active':''}" onclick="setDTab('pedigree','${id}')">Stamtavla</div> <div class="page-tab ${detailTab==='info'?'active':''}" onclick="setDTab('info','${id}')">Detaljer</div> </div> <div id="dtab">${detailTab==='pedigree'?buildPedigreeSection(p):buildInfoSection(p,sire,dam)}</div>`; } function setDTab(t,id){detailTab=t;renderDetail(id)} // ══ 5-GEN PEDIGREE (screen) ═══════════════ // Node sizes per depth: 0=root,1,2,3,4 const NODE_W=[150,136,120,106,94]; const NODE_H=[66,60,54,48,44]; const CONN_W=[14,12,10,8]; const FONT_NAME=[13,11,10,9,8]; const FONT_SMALL=[10,9,8,8,7]; function buildPedigreeSection(root){ return`<div class="section"> <div class="section-label">STAMTAVLA — 5 GENERATIONER</div> <div class="pedigree-scroll"> <div style="display:inline-flex;align-items:center;padding:4px 4px 4px 0"> ${buildScreenNode(root.id,0)} </div> </div> <div class="pedigree-hint">← Bläddra i sidled för att se alla 5 generationer</div> </div>`; } function buildScreenNode(id,depth){ const MAX=4; const p=getPigeon(id); const w=NODE_W[depth]||90,h=NODE_H[depth]||40; const fn=FONT_NAME[depth]||8,fs=FONT_SMALL[depth]||7; const cw=CONN_W[depth]||6; const nodeHtml=p ?`<div class="p-node${depth===0?' root':''}" style="width:${w}px;padding:${depth<2?'9px 10px':'7px 8px'}" onclick="${depth>0?`showDetail('${p.id}')`:''}" > <div class="p-node-name" style="font-size:${fn}px;display:flex;align-items:center;gap:4px"> <span class="p-node-dot" style="width:${depth<3?7:5}px;height:${depth<3?7:5}px;background:${getColor(p.color)}"></span> <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span> </div> <div class="p-node-ring" style="font-size:${fs}px;margin-top:2px">${esc(p.ring)}</div> <div class="p-node-sub" style="font-size:${fs}px;margin-top:1px">${esc(p.sex)} · ${p.birthYear}</div> </div>` :`<div class="p-node-unknown" style="width:${w-10}px;height:${h-10}px"><span style="font-size:${fs}px">Okänd</span></div>`; if(depth>=MAX) return nodeHtml; const sireId=p?.sireId||null,damId=p?.damId||null; return`<div style="display:flex;flex-direction:row-reverse;align-items:center"> ${nodeHtml} <div style="width:${cw}px;height:1px;background:var(--border);flex-shrink:0"></div> <div style="display:flex;flex-direction:column;gap:6px"> ${buildScreenNode(sireId,depth+1)} ${buildScreenNode(damId,depth+1)} </div> </div>`; } function buildInfoSection(p,sire,dam){ return` <div class="section"><div class="section-label">FÖRÄLDRAR</div> <div class="info-card"> <div class="info-row"><span class="info-label">Far</span><span class="info-val">${sire?esc(sire.name)+'<br><small style="color:var(--muted);font-family:monospace">'+esc(sire.ring)+'</small>':'<em style="color:var(--dim)">Okänd</em>'}</span></div> <div class="info-row"><span class="info-label">Mor</span><span class="info-val">${dam?esc(dam.name)+'<br><small style="color:var(--muted);font-family:monospace">'+esc(dam.ring)+'</small>':'<em style="color:var(--dim)">Okänd</em>'}</span></div> </div> </div> <div class="section"><div class="section-label">TÄVLING</div> <div class="info-card"> <div class="info-row"><span class="info-label">Segrar</span><span class="info-val">${p.wins||0}</span></div> <div class="info-row"><span class="info-label">Längsta sträcka</span><span class="info-val">${p.longestDistance?esc(p.longestDistance):'—'}</span></div> </div> </div> ${p.notes?`<div class="section"><div class="section-label">ANTECKNINGAR</div><div class="info-card"><div class="info-row"><span class="info-val" style="max-width:100%;text-align:left">${esc(p.notes)}</span></div></div></div>`:''}`; } // ══ PDF — 5 GEN (LANDSCAPE A4) ════════════ function printPDF(){ const p=getPigeon(currentDetailId);if(!p)return; const f=getF(currentDetailId),pct=(f*100).toFixed(2),ic=fColor(f); const sire=getPigeon(p.sireId),dam=getPigeon(p.damId); function collectAncestors(id,role,depth,maxD,acc){ if(depth>maxD||!id)return; const a=getPigeon(id);if(!a)return; acc.push({role,depth,pigeon:a}); collectAncestors(a.sireId,role+' > Far',depth+1,maxD,acc); collectAncestors(a.damId,role+' > Mor',depth+1,maxD,acc); } const ancestors=[]; collectAncestors(p.sireId,'Far',1,5,ancestors); collectAncestors(p.damId,'Mor',1,5,ancestors); document.getElementById('print-page').innerHTML=` <div class="print-wrap"> <div class="print-header"> <div class="print-title">🕊️ STAMTAVLA</div> <div style="font-family:'Cinzel',Georgia,serif;font-size:16px;color:#2a1a00;margin-top:4px">${esc(p.name)}</div> <div class="print-ring">${esc(p.ring)}</div> <div class="print-meta"> <span class="print-badge">${esc(p.sex)}</span> <span class="print-badge">${p.birthYear}</span> ${p.color?`<span class="print-badge">${esc(p.color)}</span>`:''} ${p.wins>0?`<span class="print-badge">🏆 ${p.wins} segrar</span>`:''} <span class="print-badge" style="background:#fff8e8;border-color:${ic};color:${ic}">Inavel: ${pct}% — ${fLabel(f)}</span> </div> </div> <div class="print-inavel-line"> <div> <div class="print-inavel-pct" style="color:${ic}">${pct}%</div> <div style="font-size:10px;color:#888">${fLabel(f)}</div> </div> <div class="print-inavel-bar-wrap"> <div class="print-inavel-bar"><div class="print-inavel-fill" style="width:${Math.min(f*200,100)}%;background:${ic}"></div></div> <div style="font-size:9px;color:#aaa">Wrights inavelskoefficient (F) · ${pigeons.length} individer i databasen</div> </div> </div> <div class="print-section"> <div class="print-section-title">STAMTAVLA — 5 GENERATIONER</div> <div class="print-pedigree-wrap"> <div style="display:inline-flex;flex-direction:row-reverse;align-items:center"> ${buildPrintNode(p.id,0)} </div> </div> </div> <div class="print-section"> <div class="print-section-title">UPPGIFTER</div> <div class="print-info-row"> <div class="print-info-item"><div class="print-info-lbl">FAR</div><div class="print-info-val">${sire?esc(sire.name):'Okänd'}</div>${sire?`<div style="font-family:monospace;font-size:9px;color:#888">${esc(sire.ring)}</div>`:''}</div> <div class="print-info-item"><div class="print-info-lbl">MOR</div><div class="print-info-val">${dam?esc(dam.name):'Okänd'}</div>${dam?`<div style="font-family:monospace;font-size:9px;color:#888">${esc(dam.ring)}</div>`:''}</div> <div class="print-info-item"><div class="print-info-lbl">SEGRAR</div><div class="print-info-val">${p.wins||0}</div></div> <div class="print-info-item"><div class="print-info-lbl">STRÄCKA</div><div class="print-info-val">${p.longestDistance||'—'}</div></div> </div> ${p.notes?`<div style="margin-top:6px;padding:8px;background:#fafafa;border:1px solid #eee;border-radius:5px;font-size:11px;color:#444">${esc(p.notes)}</div>`:''} </div> <div class="print-footer">Genererad ${new Date().toLocaleDateString('sv-SE')} · Stamtavla App · Wrights F = ${pct}%</div> </div>`; window.print(); } // Print pedigree node — 5 generations, landscape function buildPrintNode(id,depth){ const MAX=4; const p=getPigeon(id); const nodeHtml=p ?`<div class="print-node pn-${depth}"> <div class="print-node-name">${esc(p.name)}</div> <div class="print-node-ring">${esc(p.ring)}</div> <div class="print-node-sex">${esc(p.sex)} · ${p.birthYear}</div> </div>` :`<div class="print-unknown pu-${Math.min(depth,4)}">Okänd</div>`; if(depth>=MAX) return nodeHtml; const sireId=p?.sireId||null,damId=p?.damId||null; return`<div style="display:flex;flex-direction:row-reverse;align-items:center"> ${nodeHtml} <div class="print-connector pconn-${depth}"></div> <div class="print-col"> ${buildPrintNode(sireId,depth+1)} ${buildPrintNode(damId,depth+1)} </div> </div>`; } // ══ FORM ══════════════════════════════════ function showForm(p){ editingId=p?p.id:null;formSex=p?p.sex:'Hane';formColor=p?(p.color||''):''; formSireId=p?(p.sireId||null):null;formDamId=p?(p.damId||null):null; document.getElementById('form-title').textContent=p?'REDIGERA':'NY DUVA'; document.getElementById('f-name').value=p?p.name:''; document.getElementById('f-ring').value=p?p.ring:''; document.getElementById('f-year').value=p?p.birthYear:new Date().getFullYear(); document.getElementById('f-wins').value=p?(p.wins||0):0; document.getElementById('f-dist').value=p?(p.longestDistance||''):''; document.getElementById('f-notes').value=p?(p.notes||''):''; updateSexBtns();renderColorChips();updateParentLabels();switchTab('form'); } function cancelForm(){editingId?showDetail(editingId):showList()} function setSex(s){formSex=s;updateSexBtns()} function updateSexBtns(){ document.getElementById('seg-hane').classList.toggle('active',formSex==='Hane'); document.getElementById('seg-hona').classList.toggle('active',formSex==='Hona'); } function setColor(c){formColor=formColor===c?'':c;renderColorChips()} function renderColorChips(){ document.getElementById('color-chips').innerHTML=COLOR_OPTIONS.map(c=> `<div class="color-chip${formColor===c?' active':''}" onclick="setColor('${c}')"><span class="color-chip-dot" style="background:${getColor(c)}"></span>${c}</div>` ).join(''); } function updateParentLabels(){ const s=getPigeon(formSireId),d=getPigeon(formDamId); document.getElementById('sire-label').textContent=s?`${s.name} (${s.ring})`:'— Okänd —'; document.getElementById('dam-label').textContent=d?`${d.name} (${d.ring})`:'— Okänd —'; } function savePigeon(){ const name=document.getElementById('f-name').value.trim(); const ring=document.getElementById('f-ring').value.trim().toUpperCase(); if(!name||!ring){alert('Namn och ringnummer krävs.');return} const data={name,ring,sex:formSex,color:formColor, birthYear:parseInt(document.getElementById('f-year').value)||new Date().getFullYear(), sireId:formSireId,damId:formDamId, wins:parseInt(document.getElementById('f-wins').value)||0, longestDistance:document.getElementById('f-dist').value.trim(), notes:document.getElementById('f-notes').value.trim()}; clearFcache(); if(editingId){ const idx=pigeons.findIndex(p=>p.id===editingId); if(idx>=0)pigeons[idx]={...pigeons[idx],...data}; save();showDetail(editingId); } else { const pig={...data,id:genId(),createdAt:new Date().toISOString()}; pigeons.unshift(pig);save();showDetail(pig.id); } } // ══ DELETE ════════════════════════════════ function confirmDelete(p){ if(confirm(`Ta bort ${p.name}? Kan inte ångras.`)){ pigeons=pigeons.filter(x=>x.id!==p.id);clearFcache();save();showList(); } } // ══ PARENT PICKER ═════════════════════════ function openParentPicker(target){ pickerTarget=target; const selected=target==='sire'?formSireId:formDamId; const candidates=pigeons.filter(p=>p.id!==editingId); document.getElementById('modal-title').textContent=target==='sire'?'Välj Far':'Välj Mor'; document.getElementById('modal-list').innerHTML= `<div class="modal-row${!selected?' selected':''}" onclick="selectParent(null)">— Okänd —</div>`+ candidates.map(p=>`<div class="modal-row${selected===p.id?' selected':''}" onclick="selectParent('${p.id}')">${esc(p.name)}<div class="modal-row-sub">${esc(p.ring)} · ${esc(p.sex)} · ${p.birthYear}</div></div>`).join(''); document.getElementById('parent-modal').classList.remove('hidden'); } function selectParent(id){ if(pickerTarget==='sire')formSireId=id;else formDamId=id; updateParentLabels();closeModal(); } function closeModal(){document.getElementById('parent-modal').classList.add('hidden')} // ══ STATS ═════════════════════════════════ function renderStats(){ const total=pigeons.length,males=pigeons.filter(p=>p.sex==='Hane').length; const totalWins=pigeons.reduce((s,p)=>s+(p.wins||0),0); const top=[...pigeons].sort((a,b)=>(b.wins||0)-(a.wins||0))[0]; const colorMap={};pigeons.forEach(p=>{const c=p.color||'Okänd';colorMap[c]=(colorMap[c]||0)+1}); const colorList=Object.entries(colorMap).sort((a,b)=>b[1]-a[1]); const yearMap={};pigeons.forEach(p=>{yearMap[p.birthYear]=(yearMap[p.birthYear]||0)+1}); const yearList=Object.entries(yearMap).sort((a,b)=>b[0]-a[0]); const avgF=total>0?(pigeons.reduce((s,p)=>s+getF(p.id),0)/total*100).toFixed(1):0; const highI=pigeons.filter(p=>getF(p.id)>=0.10).length; document.getElementById('stats-content').innerHTML=` <div class="stat-grid"> <div class="stat-tile"><div class="stat-icon">🕊️</div><div class="stat-val">${total}</div><div class="stat-lbl">Totalt</div></div> <div class="stat-tile gold-border"><div class="stat-icon">🏆</div><div class="stat-val gold">${totalWins}</div><div class="stat-lbl">Segrar totalt</div></div> <div class="stat-tile"><div class="stat-icon">↑</div><div class="stat-val">${males}</div><div class="stat-lbl">Hanar</div></div> <div class="stat-tile"><div class="stat-icon">↓</div><div class="stat-val">${total-males}</div><div class="stat-lbl">Honor</div></div> </div> <div class="section" style="margin-top:14px"> <div class="section-label">INAVEL — BESTÅND</div> <div class="info-card" style="padding:16px"> <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"> <span style="color:var(--muted);font-size:14px">Genomsnittlig inavel</span> <span style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:${fColor(avgF/100)}">${avgF}%</span> </div> <div class="inavel-bar-track" style="margin-bottom:10px"><div class="inavel-bar-fill" style="width:${Math.min(avgF*2,100)}%;background:${fColor(avgF/100)}"></div></div> <div style="display:flex;justify-content:space-between"> <span style="color:var(--muted);font-size:13px">Högt inavel (≥10%)</span> <span style="color:${highI>0?'#e85050':'#7ec850'};font-weight:700">${highI} duvor</span> </div> </div> </div> ${top&&top.wins>0?`<div class="section"><div class="section-label">BÄSTA TÄVLINGSDUVA</div><div class="info-card" style="padding:16px;display:flex;align-items:center;gap:14px;border-color:rgba(212,160,23,.3)"><span style="font-size:36px">🏆</span><div style="flex:1"><div style="color:var(--gold);font-size:17px;font-weight:700">${esc(top.name)}</div><div style="color:var(--muted);font-family:monospace;font-size:12px;margin-top:2px">${esc(top.ring)}</div></div><div style="text-align:center"><div style="font-family:'Cinzel',serif;font-size:30px;color:var(--gold)">${top.wins}</div><div style="font-size:11px;color:var(--muted)">segrar</div></div></div></div>`:''} ${colorList.length>0?`<div class="section"><div class="section-label">FÄRGFÖRDELNING</div><div class="info-card" style="padding:12px 16px">${colorList.map(([color,count])=>`<div class="bar-row"><span class="dot" style="background:${getColor(color)};margin-right:4px;flex-shrink:0"></span><span class="bar-label">${esc(color)}</span><div class="bar-track"><div class="bar-fill" style="width:${total>0?(count/total*100).toFixed(1)+'%':'0%'};background:${getColor(color)}"></div></div><span class="bar-count">${count}</span></div>`).join('')}</div></div>`:''} ${yearList.length>0?`<div class="section"><div class="section-label">FÖDELSEÅR</div><div class="info-card" style="padding:8px 16px">${yearList.map(([year,count])=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted);font-family:monospace;font-size:13px;width:42px">${year}</span><span style="flex:1">${'🕊️'.repeat(Math.min(count,10))}${count>10?` +${count-10}`:''}</span><span style="color:var(--text);font-weight:700;font-size:13px">${count}</span></div>`).join('')}</div></div>`:''} ${total===0?`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Ingen data ännu</div><div class="empty-sub">Lägg till duvor för att se statistik.</div></div>`:''}`; } // ══ UTILS ═════════════════════════════════ function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')} function closeBanner(){document.getElementById('install-banner').style.display='none';localStorage.setItem('banner-closed','1')} // ══ INIT ══════════════════════════════════ load();renderList(); const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent); if(isIOS&&!window.navigator.standalone&&!localStorage.getItem('banner-closed')) document.getElementById('install-banner').style.display='flex'; </script> </body> </html>
