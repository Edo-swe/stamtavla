<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stamtavla">
<title>🕊️ Stamtavla</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0702;
    --card: #13100a;
    --card2: #1c1610;
    --border: #3a2a18;
    --gold: #d4a017;
    --gold2: #a0730a;
    --muted: #8a7060;
    --text: #e8d5b7;
    --dim: #6a5a4a;
    --red: #a82020;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Crimson Text', Georgia, serif; overflow: hidden; }

  /* ── App Shell ── */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #view { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

  /* ── Tab Bar ── */
  #tabbar {
    display: flex; background: var(--card); border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom);
  }
  .tab { flex: 1; padding: 10px 0 6px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; transition: opacity .15s; }
  .tab .ti { font-size: 22px; }
  .tab .tl { font-size: 10px; color: var(--muted); font-family: 'Cinzel', serif; letter-spacing: 1px; }
  .tab.active .tl { color: var(--gold); }

  /* ── Screens ── */
  .screen { display: none; min-height: 100%; }
  .screen.active { display: block; }

  /* ── Header ── */
  .hdr {
    padding: calc(var(--safe-top) + 16px) 18px 14px;
    background: var(--card); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .hdr-title { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold); letter-spacing: 2px; }
  .hdr-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .btn-gold {
    background: var(--gold); color: var(--bg); border: none;
    padding: 8px 16px; border-radius: 9px; font-family: 'Cinzel', serif;
    font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: .5px;
  }
  .btn-outline {
    background: transparent; color: var(--gold); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 9px; font-family: 'Cinzel', serif;
    font-size: 13px; cursor: pointer;
  }

  /* ── Search ── */
  .search-wrap { padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
  .search-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 14px; color: var(--text); font-size: 15px; font-family: 'Crimson Text', serif;
    outline: none;
  }
  .search-input::placeholder { color: var(--dim); }

  /* ── List ── */
  .list { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .pigeon-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; display: flex; align-items: center; gap: 13px; cursor: pointer;
    transition: border-color .15s;
    -webkit-user-select: none; user-select: none;
  }
  .pigeon-card:active { background: var(--card2); }
  .p-avatar { width: 50px; height: 50px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .p-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .p-ring { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 2px; }
  .p-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .p-wins { background: var(--card2); border: 1px solid var(--border); border-radius: 7px; padding: 3px 8px; font-size: 12px; color: var(--gold); font-weight: 700; white-space: nowrap; }
  .chevron { color: var(--border); font-size: 20px; margin-left: auto; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 80px 30px; }
  .empty-icon { font-size: 60px; margin-bottom: 16px; }
  .empty-title { font-family: 'Cinzel', serif; font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

  /* ── Detail ── */
  .detail-hero {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 28px 20px 20px; text-align: center;
  }
  .detail-avatar { width: 90px; height: 90px; border-radius: 45px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin: 0 auto 14px; border: 2px solid transparent; }
  .detail-name { font-family: 'Cinzel', serif; font-size: 24px; color: var(--text); }
  .detail-ring { font-size: 13px; color: var(--muted); font-family: monospace; margin-top: 4px; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 12px; }
  .badge { background: var(--card2); border: 1px solid var(--border); border-radius: 7px; padding: 4px 10px; font-size: 12px; font-weight: 600; }
  .badge.gold { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  .action-row { display: flex; gap: 8px; justify-content: center; margin-top: 16px; }

  /* ── Tabs (in-page) ── */
  .page-tabs { display: flex; margin: 14px 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 11px; overflow: hidden; }
  .page-tab { flex: 1; padding: 11px; text-align: center; font-family: 'Cinzel', serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all .15s; }
  .page-tab.active { background: var(--gold); color: var(--bg); font-weight: 700; }

  /* ── Info Section ── */
  .section { padding: 14px 16px; }
  .section-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }
  .info-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; overflow: hidden; }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
  .info-row + .info-row { border-top: 1px solid var(--border); }
  .info-label { font-size: 14px; color: var(--muted); }
  .info-val { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; max-width: 60%; }

  /* ── Pedigree ── */
  .pedigree-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px 16px; }
  .pedigree-tree { display: flex; flex-direction: row-reverse; align-items: center; gap: 0; }
  .pedigree-col { display: flex; flex-direction: column; gap: 8px; }
  .pedigree-connector { width: 16px; height: 1px; background: var(--border); flex-shrink: 0; }
  .p-node {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 11px; width: 138px; flex-shrink: 0; cursor: pointer;
  }
  .p-node.root { border-color: var(--gold); border-width: 1.5px; }
  .p-node-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-node.root .p-node-name { color: var(--gold); }
  .p-node-ring { font-size: 10px; color: var(--muted); font-family: monospace; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-node-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .p-node-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .p-node-unknown { width: 120px; height: 54px; border: 1px dashed var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .p-node-unknown span { font-size: 11px; color: var(--dim); font-style: italic; }

  /* ── Form ── */
  .form-body { padding: 14px 16px 40px; display: flex; flex-direction: column; gap: 18px; }
  .field-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'Cinzel', serif; letter-spacing: 1px; }
  .field-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 11px 13px; color: var(--text); font-size: 15px; font-family: 'Crimson Text', serif;
    outline: none; appearance: none; -webkit-appearance: none;
  }
  .field-input:focus { border-color: var(--gold); }
  .field-textarea { height: 90px; resize: none; }
  .segmented { display: flex; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
  .seg-btn { flex: 1; padding: 10px; text-align: center; font-size: 14px; cursor: pointer; color: var(--muted); background: var(--bg); font-family: 'Crimson Text', serif; border: none; font-size: 15px; }
  .seg-btn.active { background: var(--gold); color: var(--bg); font-weight: 700; }
  .color-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-chip { display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 20px; background: var(--card2); border: 1px solid var(--border); font-size: 13px; cursor: pointer; font-family: 'Crimson Text', serif; color: var(--text); }
  .color-chip.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }
  .color-chip-dot { width: 9px; height: 9px; border-radius: 50%; }
  .parent-btn { width: 100%; text-align: left; background: var(--card2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; color: var(--text); font-size: 14px; cursor: pointer; font-family: 'Crimson Text', serif; display: flex; justify-content: space-between; align-items: center; }
  .parent-btn span { color: var(--muted); font-size: 16px; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; display: flex; align-items: flex-end; }
  .modal-box { background: var(--card); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 70vh; display: flex; flex-direction: column; padding-bottom: calc(20px + var(--safe-bottom)); }
  .modal-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 16px; text-align: center; margin-bottom: 14px; }
  .modal-list { overflow-y: auto; flex: 1; }
  .modal-row { padding: 13px 10px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 15px; }
  .modal-row:active { background: var(--card2); }
  .modal-row.selected { background: var(--card2); color: var(--gold); font-weight: 600; }
  .modal-row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: monospace; }
  .modal-close { margin-top: 12px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; color: var(--muted); font-size: 14px; cursor: pointer; }

  /* ── Stats ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 16px 0; }
  .stat-tile { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; text-align: center; }
  .stat-tile.gold-border { border-color: rgba(212,160,23,.4); }
  .stat-icon { font-size: 24px; margin-bottom: 6px; }
  .stat-val { font-family: 'Cinzel', serif; font-size: 28px; color: var(--text); }
  .stat-val.gold { color: var(--gold); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .bar-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .bar-label { font-size: 13px; color: var(--text); width: 72px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 7px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; opacity: .8; transition: width .4s; }
  .bar-count { font-size: 13px; font-weight: 700; color: var(--gold); width: 22px; text-align: right; }

  /* ── Nav back ── */
  .nav-back { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 0; }
  .nav-back-icon { font-size: 20px; color: var(--gold); }
  .nav-back-text { font-size: 15px; color: var(--gold); }

  .hidden { display: none !important; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }

  /* ── Install banner ── */
  #install-banner {
    background: linear-gradient(135deg, var(--card2), var(--card));
    border: 1px solid var(--gold); border-radius: 12px; margin: 12px 16px;
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  }
  #install-banner p { font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }
  #install-banner strong { color: var(--gold); }
  #close-banner { color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="view">

    <!-- ══ LIST SCREEN ══ -->
    <div id="screen-list" class="screen active">
      <div class="hdr">
        <div>
          <div class="hdr-title">🕊️ STAMTAVLA</div>
          <div class="hdr-sub" id="list-count">0 duvor</div>
        </div>
        <button class="btn-gold" onclick="showForm(null)">+ Ny</button>
      </div>
      <div class="search-wrap">
        <input class="search-input" id="search" placeholder="🔍  Sök namn eller ring..." oninput="renderList()">
      </div>
      <div id="install-banner" style="display:none">
        <p>📲 Lägg till på hemskärmen: tryck <strong>Dela</strong> → <strong>"Lägg till på hemskärmen"</strong> så ser den ut som en riktig app!</p>
        <span id="close-banner" onclick="closeBanner()">✕</span>
      </div>
      <div id="pigeon-list" class="list"></div>
    </div>

    <!-- ══ DETAIL SCREEN ══ -->
    <div id="screen-detail" class="screen">
      <div class="hdr">
        <div class="nav-back" onclick="showList()">
          <span class="nav-back-icon">‹</span>
          <span class="nav-back-text">Tillbaka</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-outline" id="btn-edit">✏️</button>
          <button class="btn-outline" style="color:#a82020;border-color:#5a1a1a" id="btn-delete">🗑️</button>
        </div>
      </div>
      <div id="detail-content"></div>
    </div>

    <!-- ══ FORM SCREEN ══ -->
    <div id="screen-form" class="screen">
      <div class="hdr">
        <div class="nav-back" onclick="cancelForm()">
          <span class="nav-back-icon">✕</span>
          <span class="nav-back-text">Avbryt</span>
        </div>
        <div id="form-title" style="font-family:'Cinzel',serif;color:var(--gold);font-size:16px"></div>
      </div>
      <div class="form-body">
        <div>
          <div class="field-label">NAMN *</div>
          <input class="field-input" id="f-name" placeholder="t.ex. Blå Sultan">
        </div>
        <div>
          <div class="field-label">RINGNUMMER *</div>
          <input class="field-input" id="f-ring" placeholder="t.ex. SE-2024-001" style="text-transform:uppercase">
        </div>
        <div>
          <div class="field-label">KÖN</div>
          <div class="segmented">
            <button class="seg-btn active" id="seg-hane" onclick="setSex('Hane')">Hane</button>
            <button class="seg-btn" id="seg-hona" onclick="setSex('Hona')">Hona</button>
          </div>
        </div>
        <div>
          <div class="field-label">FÖDELSEÅR</div>
          <input class="field-input" id="f-year" type="number" placeholder="2024" inputmode="numeric">
        </div>
        <div>
          <div class="field-label">FÄRG</div>
          <div class="color-chips" id="color-chips"></div>
        </div>
        <div>
          <div class="field-label">FAR</div>
          <button class="parent-btn" id="btn-sire" onclick="openParentPicker('sire')">
            <span id="sire-label">— Okänd —</span><span>›</span>
          </button>
        </div>
        <div>
          <div class="field-label">MOR</div>
          <button class="parent-btn" id="btn-dam" onclick="openParentPicker('dam')">
            <span id="dam-label">— Okänd —</span><span>›</span>
          </button>
        </div>
        <div>
          <div class="field-label">ANTAL SEGRAR</div>
          <input class="field-input" id="f-wins" type="number" placeholder="0" inputmode="numeric">
        </div>
        <div>
          <div class="field-label">LÄNGSTA STRÄCKA</div>
          <input class="field-input" id="f-dist" placeholder="t.ex. 700 km">
        </div>
        <div>
          <div class="field-label">ANTECKNINGAR</div>
          <textarea class="field-input field-textarea" id="f-notes" placeholder="Övriga noteringar..."></textarea>
        </div>
        <button class="btn-gold" id="btn-save" onclick="savePigeon()" style="width:100%;padding:15px;font-size:16px">Spara</button>
      </div>
    </div>

    <!-- ══ STATS SCREEN ══ -->
    <div id="screen-stats" class="screen">
      <div class="hdr"><div class="hdr-title">📊 STATISTIK</div></div>
      <div id="stats-content"></div>
    </div>

  </div>

  <!-- ── Tab Bar ── -->
  <div id="tabbar">
    <div class="tab active" id="tab-list" onclick="switchTab('list')">
      <span class="ti">🕊️</span><span class="tl">DUVOR</span>
    </div>
    <div class="tab" id="tab-stats" onclick="switchTab('stats')">
      <span class="ti">📊</span><span class="tl">STATISTIK</span>
    </div>
  </div>
</div>

<!-- ── Parent picker modal ── -->
<div id="parent-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Välj förälder</div>
    <div class="modal-list" id="modal-list"></div>
    <div class="modal-close" onclick="closeModal()">Avbryt</div>
  </div>
</div>

<script>
// ══ DATA ══════════════════════════════════════════════
const PIGEON_COLORS = {
  'Blå':'#4a7fb5','Röd':'#c0392b','Silvrig':'#95a5a6','Vit':'#ddeef0',
  'Brun':'#8B5E3C','Gul':'#d4a017','Svart':'#555','Checkered':'#888','Grizzle':'#b0956e','Annat':'#a0856c'
};
const COLOR_OPTIONS = Object.keys(PIGEON_COLORS);

function getColor(c) { return PIGEON_COLORS[c] || '#a0856c'; }

let pigeons = [];
let formSex = 'Hane';
let formColor = '';
let formSireId = null;
let formDamId = null;
let editingId = null;
let pickerTarget = null;
let currentDetailId = null;
let detailTab = 'pedigree';

function load() {
  try { pigeons = JSON.parse(localStorage.getItem('pigeons') || '[]'); } catch { pigeons = []; }
}
function save() { localStorage.setItem('pigeons', JSON.stringify(pigeons)); }
function getPigeon(id) { return pigeons.find(p => p.id === id) || null; }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ══ NAVIGATION ════════════════════════════════════════
let activeTab = 'list';

function switchTab(tab) {
  if (tab === 'list' || tab === 'stats') activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + (tab === 'list' || tab === 'detail' || tab === 'form' ? 'list' : 'stats')).classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('view').scrollTop = 0;
  if (tab === 'stats') renderStats();
  if (tab === 'list') renderList();
}

function showList() { switchTab('list'); }

function showDetail(id) {
  currentDetailId = id;
  detailTab = 'pedigree';
  renderDetail(id);
  switchTab('detail');
}

// ══ LIST ══════════════════════════════════════════════
function renderList() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const filtered = pigeons.filter(p =>
    p.name.toLowerCase().includes(q) || p.ring.toLowerCase().includes(q)
  );
  document.getElementById('list-count').textContent = pigeons.length + ' duvor registrerade';
  const el = document.getElementById('pigeon-list');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">🕊️</div>
      <div class="empty-title">${pigeons.length === 0 ? 'Inga duvor ännu' : 'Inga träffar'}</div>
      <div class="empty-sub">${pigeons.length === 0 ? 'Tryck på "+ Ny" för att lägga till din första duva.' : 'Prova ett annat sökord.'}</div>
      ${pigeons.length === 0 ? `<button class="btn-gold" onclick="showForm(null)">Lägg till duva</button>` : ''}
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(p => `
    <div class="pigeon-card" onclick="showDetail('${p.id}')">
      <div class="p-avatar" style="background:${getColor(p.color)}22">🕊️</div>
      <div style="flex:1;min-width:0">
        <div class="p-name">${esc(p.name)}</div>
        <div class="p-ring">${esc(p.ring)}</div>
        <div class="p-sub">${esc(p.sex)} · ${p.birthYear}${p.color ? ' · ' + esc(p.color) : ''}</div>
      </div>
      ${p.wins > 0 ? `<div class="p-wins">🏆 ${p.wins}</div>` : ''}
      <div class="chevron">›</div>
    </div>
  `).join('');
}

// ══ DETAIL ════════════════════════════════════════════
function renderDetail(id) {
  const p = getPigeon(id);
  if (!p) return;
  const c = getColor(p.color);
  const sire = getPigeon(p.sireId);
  const dam = getPigeon(p.damId);

  document.getElementById('btn-edit').onclick = () => showForm(p);
  document.getElementById('btn-delete').onclick = () => confirmDelete(p);

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <div class="detail-avatar" style="background:${c}22;border-color:${c}55">🕊️</div>
      <div class="detail-name">${esc(p.name)}</div>
      <div class="detail-ring">${esc(p.ring)}</div>
      <div class="badge-row">
        <span class="badge">${esc(p.sex)}</span>
        <span class="badge">${p.birthYear}</span>
        ${p.color ? `<span class="badge"><span class="dot" style="background:${c};margin-right:4px"></span>${esc(p.color)}</span>` : ''}
        ${p.wins > 0 ? `<span class="badge gold">🏆 ${p.wins} segrar</span>` : ''}
      </div>
      <div class="action-row">
        <button class="btn-outline" onclick="showForm(${JSON.stringify(p).replace(/"/g,'&quot;')})">✏️ Redigera</button>
        <button class="btn-outline" style="color:#a82020;border-color:#5a1a1a" onclick="confirmDelete(${JSON.stringify(p).replace(/"/g,'&quot;')})">🗑️ Ta bort</button>
      </div>
    </div>

    <div class="page-tabs">
      <div class="page-tab ${detailTab==='pedigree'?'active':''}" onclick="setDetailTab('pedigree','${id}')">Stamtavla</div>
      <div class="page-tab ${detailTab==='info'?'active':''}" onclick="setDetailTab('info','${id}')">Detaljer</div>
    </div>

    <div id="detail-tab-content">
      ${detailTab === 'pedigree' ? renderPedigreeTab(p) : renderInfoTab(p, sire, dam)}
    </div>
  `;
}

function setDetailTab(tab, id) {
  detailTab = tab;
  renderDetail(id);
}

function renderPedigreeTab(root) {
  return `
    <div class="section">
      <div class="section-label">HÄRSTAMNING — 3 GENERATIONER</div>
      <div class="pedigree-scroll">
        <div style="display:inline-flex;flex-direction:row-reverse;align-items:center;padding:4px 0">
          ${buildPedigreeNode(root.id, 0, 2)}
        </div>
      </div>
      <div style="font-size:11px;color:var(--dim);text-align:center;margin-top:4px">← Bläddra för fler generationer</div>
    </div>`;
}

function buildPedigreeNode(id, depth, maxDepth) {
  const p = getPigeon(id);
  const c = p ? getColor(p.color) : '#3a2a18';

  const nodeHtml = p
    ? `<div class="p-node${depth===0?' root':''}" onclick="${depth>0?`showDetail('${p.id}')`:''}" style="${depth===0?'':'cursor:pointer'}">
        <div class="p-node-name"><span class="p-node-dot" style="background:${c}"></span>${esc(p.name)}</div>
        <div class="p-node-ring">${esc(p.ring)}</div>
        <div class="p-node-sub">${esc(p.sex)} · ${p.birthYear}</div>
       </div>`
    : `<div class="p-node-unknown"><span>Okänd</span></div>`;

  if (depth >= maxDepth) return nodeHtml;

  const sireId = p?.sireId || null;
  const damId  = p?.damId  || null;
  const hasParents = sireId || damId || depth < maxDepth;

  return `
    <div style="display:flex;flex-direction:row-reverse;align-items:center">
      ${nodeHtml}
      ${hasParents ? `<div style="width:16px;height:1px;background:var(--border);flex-shrink:0"></div>` : ''}
      <div style="display:flex;flex-direction:column;gap:8px">
        ${buildPedigreeNode(sireId, depth+1, maxDepth)}
        ${buildPedigreeNode(damId,  depth+1, maxDepth)}
      </div>
    </div>`;
}

function renderInfoTab(p, sire, dam) {
  return `
    <div class="section">
      <div class="section-label">FÖRÄLDRAR</div>
      <div class="info-card">
        <div class="info-row"><span class="info-label">Far</span><span class="info-val">${sire ? esc(sire.name) + '<br><small style="color:var(--muted);font-family:monospace">'+esc(sire.ring)+'</small>' : '<em style="color:var(--dim)">Okänd</em>'}</span></div>
        <div class="info-row"><span class="info-label">Mor</span><span class="info-val">${dam ? esc(dam.name) + '<br><small style="color:var(--muted);font-family:monospace">'+esc(dam.ring)+'</small>' : '<em style="color:var(--dim)">Okänd</em>'}</span></div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">TÄVLING</div>
      <div class="info-card">
        <div class="info-row"><span class="info-label">Segrar</span><span class="info-val">${p.wins || 0}</span></div>
        <div class="info-row"><span class="info-label">Längsta sträcka</span><span class="info-val">${p.longestDistance ? esc(p.longestDistance) : '—'}</span></div>
      </div>
    </div>
    ${p.notes ? `<div class="section"><div class="section-label">ANTECKNINGAR</div><div class="info-card"><div class="info-row"><span class="info-val" style="max-width:100%;text-align:left">${esc(p.notes)}</span></div></div></div>` : ''}
  `;
}

// ══ FORM ══════════════════════════════════════════════
function showForm(p) {
  editingId = p ? p.id : null;
  formSex = p ? p.sex : 'Hane';
  formColor = p ? (p.color || '') : '';
  formSireId = p ? (p.sireId || null) : null;
  formDamId  = p ? (p.damId  || null) : null;

  document.getElementById('form-title').textContent = p ? 'REDIGERA' : 'NY DUVA';
  document.getElementById('f-name').value  = p ? p.name  : '';
  document.getElementById('f-ring').value  = p ? p.ring  : '';
  document.getElementById('f-year').value  = p ? p.birthYear : new Date().getFullYear();
  document.getElementById('f-wins').value  = p ? (p.wins || 0) : 0;
  document.getElementById('f-dist').value  = p ? (p.longestDistance || '') : '';
  document.getElementById('f-notes').value = p ? (p.notes || '') : '';

  updateSexBtns();
  renderColorChips();
  updateParentLabels();
  switchTab('form');
}

function cancelForm() {
  if (editingId) showDetail(editingId);
  else showList();
}

function setSex(s) { formSex = s; updateSexBtns(); }
function updateSexBtns() {
  document.getElementById('seg-hane').classList.toggle('active', formSex === 'Hane');
  document.getElementById('seg-hona').classList.toggle('active', formSex === 'Hona');
}

function setColor(c) {
  formColor = formColor === c ? '' : c;
  renderColorChips();
}

function renderColorChips() {
  document.getElementById('color-chips').innerHTML = COLOR_OPTIONS.map(c => `
    <div class="color-chip${formColor===c?' active':''}" onclick="setColor('${c}')">
      <span class="color-chip-dot" style="background:${getColor(c)}"></span>${c}
    </div>`).join('');
}

function updateParentLabels() {
  const sire = getPigeon(formSireId);
  const dam  = getPigeon(formDamId);
  document.getElementById('sire-label').textContent = sire ? `${sire.name} (${sire.ring})` : '— Okänd —';
  document.getElementById('dam-label').textContent  = dam  ? `${dam.name} (${dam.ring})`   : '— Okänd —';
}

function savePigeon() {
  const name = document.getElementById('f-name').value.trim();
  const ring = document.getElementById('f-ring').value.trim().toUpperCase();
  if (!name || !ring) { alert('Namn och ringnummer krävs.'); return; }

  const data = {
    name, ring,
    sex: formSex,
    color: formColor,
    birthYear: parseInt(document.getElementById('f-year').value) || new Date().getFullYear(),
    sireId: formSireId,
    damId:  formDamId,
    wins: parseInt(document.getElementById('f-wins').value) || 0,
    longestDistance: document.getElementById('f-dist').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
  };

  if (editingId) {
    const idx = pigeons.findIndex(p => p.id === editingId);
    if (idx >= 0) pigeons[idx] = { ...pigeons[idx], ...data };
    save(); showDetail(editingId);
  } else {
    const pigeon = { ...data, id: genId(), createdAt: new Date().toISOString() };
    pigeons.unshift(pigeon);
    save(); showDetail(pigeon.id);
  }
}

// ══ DELETE ════════════════════════════════════════════
function confirmDelete(p) {
  if (confirm(`Ta bort ${p.name}? Kan inte ångras.`)) {
    pigeons = pigeons.filter(x => x.id !== p.id);
    save(); showList();
  }
}

// ══ PARENT PICKER ═════════════════════════════════════
function openParentPicker(target) {
  pickerTarget = target;
  const selected = target === 'sire' ? formSireId : formDamId;
  const candidates = pigeons.filter(p => p.id !== editingId);
  document.getElementById('modal-title').textContent = target === 'sire' ? 'Välj Far' : 'Välj Mor';
  document.getElementById('modal-list').innerHTML = `
    <div class="modal-row${!selected?' selected':''}" onclick="selectParent(null)">— Okänd —</div>
    ${candidates.map(p => `
      <div class="modal-row${selected===p.id?' selected':''}" onclick="selectParent('${p.id}')">
        ${esc(p.name)}
        <div class="modal-row-sub">${esc(p.ring)} · ${esc(p.sex)} · ${p.birthYear}</div>
      </div>`).join('')}
  `;
  document.getElementById('parent-modal').classList.remove('hidden');
}

function selectParent(id) {
  if (pickerTarget === 'sire') formSireId = id;
  else formDamId = id;
  updateParentLabels();
  closeModal();
}

function closeModal() { document.getElementById('parent-modal').classList.add('hidden'); }

// ══ STATS ═════════════════════════════════════════════
function renderStats() {
  const total = pigeons.length;
  const males = pigeons.filter(p => p.sex === 'Hane').length;
  const females = total - males;
  const totalWins = pigeons.reduce((s,p) => s+(p.wins||0), 0);
  const top = [...pigeons].sort((a,b)=>(b.wins||0)-(a.wins||0))[0];

  const colorMap = {};
  pigeons.forEach(p => { const c = p.color||'Okänd'; colorMap[c]=(colorMap[c]||0)+1; });
  const colorList = Object.entries(colorMap).sort((a,b)=>b[1]-a[1]);

  const yearMap = {};
  pigeons.forEach(p => { yearMap[p.birthYear]=(yearMap[p.birthYear]||0)+1; });
  const yearList = Object.entries(yearMap).sort((a,b)=>b[0]-a[0]);

  document.getElementById('stats-content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-tile"><div class="stat-icon">🕊️</div><div class="stat-val">${total}</div><div class="stat-lbl">Totalt</div></div>
      <div class="stat-tile gold-border"><div class="stat-icon">🏆</div><div class="stat-val gold">${totalWins}</div><div class="stat-lbl">Segrar totalt</div></div>
      <div class="stat-tile"><div class="stat-icon">↑</div><div class="stat-val">${males}</div><div class="stat-lbl">Hanar</div></div>
      <div class="stat-tile"><div class="stat-icon">↓</div><div class="stat-val">${females}</div><div class="stat-lbl">Honor</div></div>
    </div>

    ${top && top.wins > 0 ? `
    <div class="section" style="margin-top:14px">
      <div class="section-label">BÄSTA TÄVLINGSDUVA</div>
      <div class="info-card" style="padding:16px;display:flex;align-items:center;gap:14px;border-color:rgba(212,160,23,.3)">
        <span style="font-size:36px">🏆</span>
        <div style="flex:1">
          <div style="color:var(--gold);font-size:17px;font-weight:700">${esc(top.name)}</div>
          <div style="color:var(--muted);font-family:monospace;font-size:12px;margin-top:2px">${esc(top.ring)}</div>
        </div>
        <div style="text-align:center">
          <div style="font-family:'Cinzel',serif;font-size:30px;color:var(--gold)">${top.wins}</div>
          <div style="font-size:11px;color:var(--muted)">segrar</div>
        </div>
      </div>
    </div>` : ''}

    ${colorList.length > 0 ? `
    <div class="section">
      <div class="section-label">FÄRGFÖRDELNING</div>
      <div class="info-card" style="padding:12px 16px">
        ${colorList.map(([color,count]) => `
          <div class="bar-row">
            <span class="dot" style="background:${getColor(color)};margin-right:4px;flex-shrink:0"></span>
            <span class="bar-label">${esc(color)}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${total>0?(count/total*100).toFixed(1)+'%':'0%'};background:${getColor(color)}"></div></div>
            <span class="bar-count">${count}</span>
          </div>`).join('')}
      </div>
    </div>` : ''}

    ${yearList.length > 0 ? `
    <div class="section">
      <div class="section-label">FÖDELSEÅR</div>
      <div class="info-card" style="padding:8px 16px">
        ${yearList.map(([year,count]) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
            <span style="color:var(--muted);font-family:monospace;font-size:13px;width:42px">${year}</span>
            <span style="flex:1">${'🕊️'.repeat(Math.min(count,10))}${count>10?` +${count-10}`:''}</span>
            <span style="color:var(--text);font-weight:700;font-size:13px">${count}</span>
          </div>`).join('')}
      </div>
    </div>` : ''}

    ${total === 0 ? `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Ingen data ännu</div><div class="empty-sub">Lägg till duvor för att se statistik.</div></div>` : ''}
  `;
}

// ══ UTILS ═════════════════════════════════════════════
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══ INSTALL BANNER ════════════════════════════════════
function closeBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('banner-closed', '1');
}

// ══ INIT ══════════════════════════════════════════════
load();
renderList();

// Show install banner on iOS Safari if not yet dismissed
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
const bannerClosed = localStorage.getItem('banner-closed');
if (isIOS && !isStandalone && !bannerClosed) {
  document.getElementById('install-banner').style.display = 'flex';
}
</script>
</body>
</html>
